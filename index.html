<!DOCTYPE html>
<html lang="en">

<head>
    <title>APA Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no" />
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3pro.css ">
    <link rel="stylesheet" href="https://pyscript.net/snapshots/2023.11.1.RC3/core.css" />
    <script defer src="https://pyscript.netsnapshots/2023.11.1.RC3/core.js"></script>

    <style>
    
    .header {
        background-color: #414247;
        padding: 5px;
        margin-bottom: 30px;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        border-bottom: 1px solid #7B8A8D;
    }

    .header-item {
        padding: 0px;
        margin: 0px;
    }

    body {
        background-color: #414247;
        padding: 30px;
        margin: 0px;
        font-family: "Calibri Light";
    }

    h1,
    h2,
    h3,
    h4 {
        font-family: "Calibri Light";
        color: white;
    }



    table {
        font-family: "Calibri Light", sans-serif;
        width: 60%;
        border-spacing: 20px;
    }

    td,
    th {
        border: 1px solid #dddddd;
        text-align: center;
        padding-top: 30px;
        padding-bottom: 30px;
    }

    /* tr:nth-child(even) {
    background-color: #dddddd;
    } */

    .collapsible {
        background-color: #7B8A8D;
        /* color: white; */
        cursor: pointer;
        padding: 18px;
        width: 100%;
        border: none;
        text-align: left;
        outline: none;
        font-size: 20px;
        margin-bottom: 30px;
    }

    /* .active, .collapsible:hover {
    background-color: #555;
    } */

    .content {
        display: none;
        margin-left: auto;
        margin-right: auto;
        color: white;
    }

    .sticky {
        position: fixed;
        top: 0;
        width: 100%;
    }

    .sticky + .content {
        width: 100%;
        padding-top: 102px;
    }

    </style>

</head>

<body>
    <py-script src="./main.py"></py-script>

    <div class="header" id="myHeader">
        <div class="header-item">
            <h1 style="margin: 0px; padding: 0px;">APA Dashboard</h2>
        </div>
        <div class="header-item" >
            <h2 id="time_output" style="margin: 0px; padding: 0px;">.</h2>
        </div>
    </div>

</body>

</html>
