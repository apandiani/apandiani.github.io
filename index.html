<!DOCTYPE html>
<html lang="en">

<head>
    <title>Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
        <text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no" />

    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register('service-worker.js').then(function(registration) {
                    console.log('ServiceWorker registered');
                  }).catch(function(err) {
                    console.log('ServiceWorker error: ', err);
                  });
            })
        }
    </script>

    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    
    <link rel="stylesheet" href="https://pyscript.net/snapshots/2023.11.1.RC3/core.css" />
    <script type="module" src="https://pyscript.net/snapshots/2023.11.1.RC3/core.js"></script>

    <style>

        body {
            background-color:#414247;
            padding: 15px;
            margin: 0px;
            font-family: "Calibri Light";
        }

        body, h1, h2, h3, h4, h5, h6 {
            font-family: "Calibri Light";
            color: white;
        }



        table {
            font-family: "Calibri Light", sans-serif;
            width: 60%;
            border-spacing: 20px;
        }

        td,
        th {
            border: 1px solid #dddddd;
            text-align: center;
            padding-top: 30px;
            padding-bottom: 30px;
        }

        /* tr:nth-child(even) {
        background-color: #dddddd;
        } */

        .collapsible {
            background-color: #7B8A8D;
            /* color: white; */
            cursor: pointer;
            padding: 18px;
            width: 100%;
            border: none;
            text-align: left;
            outline: none;
            font-size: 20px;
            margin-bottom: 30px;
        }

        /* .active, .collapsible:hover {
        background-color: #555;
        } */

        .content {
            display: none;
            margin-left: auto;
            margin-right: auto;
            color: white;
        }

        .sticky {
            position: fixed;
            top: 0;
            width: 100%;
        }

        .sticky + .content {
            width: 100%;
            padding-top: 102px;
        }

    </style>

</head>

<body>
    <header class="w3-cell-row w3-border-bottom">
        <div class="w3-container w3-cell w3-cell-bottom">
            <h3>Dashboard</h3>
        </div>
        <div class="w3-container w3-cell w3-cell-bottom">
            <h4 id="time_output" class="w3-right-align">.</h4>
        </div>
    </header>

    <div class="w3-row">

        <div class="w3-container w3-quarter w3-section">
            <div class="w3-card-4">
                <header class="w3-container w3-orange">
                <h5 class="w3-wide w3-text-black"><b>TODAY</b></h5>
                </header>
                <div style="width:280px;height:331px" class="w3-content">
                    <iframe scrolling="no" style="border:0;width:100%;height:100%"
                    src="https://search.ch/meteo/widget/Bubikon?bgcolor=414247&amp;fgcolor=ffffff&amp;days=1"></iframe>
                </div>
            </div>
        </div>

        <div class="w3-container w3-quarter w3-section">
            <div class="w3-card-4">
                <header class="w3-container w3-orange">
                <h5 class="w3-wide w3-text-black"><b>ST2</b></h5>
                </header>
                <div class="w3-container">

                </div>
            </div>
        </div>

        <div class="w3-container w3-quarter w3-section">
            <div class="w3-card-4">
                <header class="w3-container w3-orange">
                <h5 class="w3-wide w3-text-black"><b>LINKS</b></h5>
                </header>
                <div class="w3-container">
                    <div class="w3-ul w3-large">
                        <li>
                            <a href="https://duckduckgo.com/" target="_blank">DuckDuckGo</a>
                        </li>
                        <li>
                            <a href="https://www.google.ch/" target="_blank">Google</a>
                        </li>
                        <li>
                            <a href="https://docs.pyscript.net/latest" target="_blank">PyScript Docs</a>
                        </li>
                    </div>
                </div>
            </div>
        </div>

        <div class="w3-container w3-quarter w3-section">
            <div class="w3-card-4">
                <header class="w3-container w3-orange">
                <h5 class="w3-wide w3-text-black"><b>SOMETHING</b></h5>
                </header>
                <div class="w3-container">
                    <p>Something</p>
                </div>
            </div>
        </div>



    </div>


    <script type="py" src="./main.py" config="pyscript.toml"></script>



</body>

</html>
