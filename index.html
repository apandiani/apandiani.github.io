<!DOCTYPE html>
<html lang="en">

<head>
    <title>Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
        <text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no" />

    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register('service-worker.js').then(function(registration) {
                    console.log('ServiceWorker registered');
                  }).catch(function(err) {
                    console.log('ServiceWorker error: ', err);
                  });
            })
        }
    </script>

    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2023.11.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2023.11.1/core.js"></script>

    <style>

        body {
            background-color: #2d2d2d;
            padding: 15px;
            margin: 0px;
            font-family: "Calibri Light";
        }

        body, h1, h2, h3, h4, h5, h6 {
            font-family: "Calibri Light";
            color: white;
        }

        hr.solid {
            border-top: 1px solid;
            margin: 0px 15px;
            color: orange;
        }


    </style>

</head>

<body>
    <header class="w3-cell-row w3-border-bottom">
        <div class="w3-container w3-cell w3-cell-bottom">
            <h3>Dashboard</h3>
        </div>
        <div class="w3-container w3-cell w3-cell-bottom w3-right-align">
            <h6 id="time_output">.</h6>
        </div>
    </header>

    <div class="w3-row">

        <div class="w3-container w3-half w3-section">
            <div class="w3-card-4" style='background-color: #373737'>
                <header class="w3-container w3-orange">
                <h5 class="w3-wide w3-text-black"><b>TODAY</b></h5>
                </header>
                <div style="width:360px;height:410px" class="w3-content">
                    <iframe scrolling="no" style="border:0;width:100%;height:100%"
                    src="https://search.ch/meteo/widget/Bubikon.en.html?bgcolor=373737&amp;fgcolor=ffffff"></iframe>
                </div>
            </div>
        </div>

        <div class="w3-container w3-quarter w3-section">
            <div class="w3-card-4" style='background-color: #373737'>
                <header class="w3-container w3-orange">
                <h6 class="w3-wide w3-text-black"><b>ST2</b></h6>
                </header>
                <table class="w3-table w3-margin-top">
                    <tr>
                        <td>Total distance</th>
                        <td>Battery health</th>
                    </tr>
                    <tr >
                        <td id="st2_tot" class="w3-xxlarge">.</td>
                        <td id="st2_bat" class="w3-xxlarge">.</td>
                    </tr>
                </table>
                <div class="w3-container w3-center w3-small">
                    <p id="st2_date">.</p>
                </div>
                <hr class="solid">
                <div id="stromer_feed" class="w3-container"></div>
            </div>
        </div>

        <div class="w3-container w3-quarter w3-section">
            <div class="w3-card-4" style='background-color: #373737'>
                <div class="w3-container w3-orange">
                <h6 class="w3-wide w3-text-black"><b>SRI LANKAN RUPEE</b></h6>
                </div>
                <div class="w3-row w3-container w3-center">
                    <p id='lkr' class="w3-xxlarge">.</p>
                </div>
                <div class="w3-cell-row">
                    <div class="w3-cell w3-container">
                        <input id="input_chf" class="w3-input" type="number"
                        placeholder="CHF">
                    </div>
                    <div class="w3-cell w3-container">
                        <button id="reset" class="w3-button w3-orange" py-click="reset_lkr">RESET</button>
                    </div>
                    <div class="w3-cell w3-container">
                        <input id="input_lkr" class="w3-input" type="number"
                        placeholder="LKR">
                    </div>
                </div>
                <div class="w3-container w3-center w3-small">
                    <p id="lkr_date">.</p>
                </div>
            </div>
        </div>
    </div>
    <div class="w3-center">
        <div class="w3-bar">
            <a href="mailto:anthony.pandiani@gmail.com">
            <button class="w3-button w3-orange">anthony.pandiani@gmail.com</button>
            </a>
        </div>
    </div>

    <py-script src="./main.py" config="pyscript.toml" async></py-script>
    <!-- <script type="mpy">
        from pyscript import display
        from time import localtime
        now = localtime()
        print(now)
    </script> -->

</body>

</html>
