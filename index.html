<!DOCTYPE html>
<html lang="en">

<head>
    <title>anthony's dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
        <text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no" />

    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register('service-worker.js').then(function(registration) {
                    console.log('ServiceWorker registered');
                  }).catch(function(err) {
                    console.log('ServiceWorker error: ', err);
                  });
            })
        }
    </script>

    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <!-- <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined"> -->
    
    <script type="module" src="https://pyscript.net/releases/2023.11.1/core.js"></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2023.11.1/core.css" />
    
    <style>

        body {
            background-color: #202020;
            padding: 15px;
            margin: 0px;
        }

        body, h1, h2, h3, h4, h5, h6 {
            font-family: "Calibri Light";
            color: white;
        }

        hr.solid {
            border-top: 1px solid;
            margin: 0px 15px;
            color: orange;
        }

        a { text-decoration: none; }

    </style>

</head>

<body>
    <div class="w3-row w3-wide w3-center">
        <h3>anthony's dashboard</h3>
    </div>
    <div class="w3-row w3-center w3-wide w3-border-bottom">
        <p id="time_output">.</p>
    </div>

    <div class="w3-row">

        <div class="w3-container w3-quarter w3-section">
            <div class="w3-card-4" style='background-color: #373737'>
                <header class="w3-container w3-orange">
                <h5 class="w3-wide w3-text-black"><b>TODAY</b></h5>
                </header>
                <div style="width:280px;height:352px" class="w3-content">
                    <iframe scrolling="no" style="border:0;width:100%;height:100%"
                    src="https://search.ch/meteo/widget/Bubikon.en.html?bgcolor=373737&amp;fgcolor=ffffff&amp;days=1"></iframe>
                </div>
            </div>
        </div>

        <div class="w3-container w3-quarter w3-section">
            <div class="w3-card-4" style='background-color: #373737'>
                <header class="w3-container w3-orange">
                <h5 class="w3-wide w3-text-black"><b>OPENWEATHERMAP</b></h5>
                </header>
                <div class="w3-container w3-center">
                    <p id="owm">.</p>
                </div>
                <hr class="solid w3-margin-top">
                <div class="w3-container w3-center w3-small">
                    <p id="owm_date">.</p>
                </div>
            </div>
        </div>

        <div class="w3-container w3-quarter w3-section">
            <div class="w3-card-4" style='background-color: #373737'>
                <header class="w3-container w3-orange">
                <h5 class="w3-wide w3-text-black"><b>ST2</b></h5>
                </header>
                <table class="w3-table w3-margin-top">
                    <tr>
                        <td>Total distance</th>
                        <td>Battery health</th>
                    </tr>
                    <tr >
                        <td id="st2_tot" class="w3-xxlarge">.</td>
                        <td id="st2_bat" class="w3-xxlarge">.</td>
                    </tr>
                </table>
                <div class="w3-container w3-center w3-small">
                    <p id="st2_date">.</p>
                </div>
                <hr class="solid">
                <div id="stromer_feed" class="w3-container"></div>
                <hr class="solid">
                <div class="w3-section w3-center w3-small w3-wide">
                    <a href="https://www.stromerforum.ch" target="_blank" rel="noopener noreferrer">Stromer Forum</a>
                </div>
            </div>
        </div>

        <div class="w3-container w3-quarter w3-section">
            <div class="w3-card-4" style='background-color: #373737'>
                <div class="w3-container w3-orange">
                <h5 class="w3-wide w3-text-black"><b>SRI LANKAN RUPEE</b></h5>
                </div>
                <div class="w3-row w3-container w3-center">
                    <p id='lkr' class="w3-xxlarge">.</p>
                </div>
                <div class="w3-cell-row">
                    <div class="w3-cell w3-container">
                        <input id="input_chf" class="w3-input" type="number"
                        placeholder="CHF">
                    </div>
                    <div class="w3-cell w3-container">
                        <button id="lkr_reset" class="w3-button w3-orange">RESET</button>
                    </div>
                    <div class="w3-cell w3-container">
                        <input id="input_lkr" class="w3-input" type="number"
                        placeholder="LKR">
                    </div>
                </div>
                <hr class="solid w3-margin-top">
                <div class="w3-container w3-center">
                    <p class="w3-wide">Progress over last month</p>
                    <img id="lkr_plot" class="w3-image">
                </div>
                <hr class="solid w3-margin-top">
                <div class="w3-container w3-center w3-small">
                    <p id="lkr_date">.</p>
                </div>
            </div>
        </div>
    </div>
    <div class="w3-center w3-border-top">
        <div class="w3-bar w3-margin-top">
            <a href="mailto:anthony.pandiani@gmail.com">
            <button class="w3-button w3-orange">anthony.pandiani@gmail.com</button>
            </a>
        </div>
    </div>

    <py-config>
        {
            "packages": ["matplotlib", "pytz"]
        }
    </py-config>

    <script type="py" src="./clock.py" async></script>
    <script type="py" src="./owm.py" async></script>
    <script type="py" src="./st2.py" async></script>
    <script type="py" src="./lkr.py" async></script>
</body>

</html>
