<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
    <title>anthony's dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
        <text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no" />

    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register('service-worker.js').then(function(registration) {
                    console.log('ServiceWorker registered');
                  }).catch(function(err) {
                    console.log('ServiceWorker error: ', err);
                  });
            })
        }
    </script>

    
    
    <script type="module" src="https://pyscript.net/releases/2023.12.1/core.js"></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2023.12.1/core.css" />
    <link rel="stylesheet" type="text/css" href="bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="custom.css">

</head>

<body>
    <div class="container text-center pt-4">
    <h1>anthony's dashboard</h1>
        <p id="time_output" class="font-monospace fw-lighter">.</p>
    </div>
    <div class="container px-4">

        <div class="row row-cols-1 row-cols-md-2 g-4">

            <div class="col">
                <div class="card">
                    <div class="card-header h5 text-black" style='background-color: orange'>
                        TODAY
                    <!-- <h2 class="custom">TODAY</h2> -->
                    </div>
                    <div class="card-body">
                        <div style="height:280px">
                            <iframe scrolling="no" style="border:0;width:100%;height:100%"
                            src="https://search.ch/meteo/widget/Bubikon.en.html?bgcolor=373737&amp;fgcolor=b4b4b4&amp;days=1"></iframe>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card">
                    <div class="card-header h5">
                        OPENWEATHERMAP
                    </div>
                    <div class="card-body">
                        <p id="owm">.</p>
                    </div>
                    <div class="card-footer text-center">
                        <p id="owm_date" class="card-text">.</p>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card">
                    <div class="card-header h5">
                        ST2
                    </div>
                    <div class="card-body">
                        <div class="row row-cols-2 text-center">
                            <div class="col">Total distance</div>
                            <div class="col">Battery health</div>
                            <div id="st2_tot" class="col display-3">.</div>
                            <div id="st2_bat" class="col display-3">.</div>
                        </div>
                        <p id="st2_date" class="container text-center pt-3">.</p>
                        <hr class="solid">
                        <div id="stromer_feed"></div>
                    </div>
                    <div class="card-footer text-center fw-lighter">
                        <a href="https://www.stromerforum.ch" class="link-underline-opacity-0 link-light"
                        target="_blank" rel="noopener noreferrer">
                            Stromer Forum
                        </a>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card">
                    <div class="card-header h5">
                        SRI LANKAN RUPEE
                    </div>
                    <div class="card-body">
                        <div id='lkr' class="container text-center display-3 py-4">.</div>
                        <div class="input-group py-2">
                            <input id="input_chf" class="form-control" type="number" placeholder="CHF">
                            <button id="lkr_reset" class="btn" type="button">RESET</button>
                            <input id="input_lkr" class="form-control" type="number" placeholder="LKR">
                        </div>
                        <hr>
                        <div class="container">
                            <p class="text-center">Progress over last month</p>
                            <img id="lkr_plot" class="img-fluid">
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <p id="lkr_date" class="card-text">.</p>
                    </div>
                </div>
            </div>
            
            <div class="col">
                <div class="card">
                    <div class="card-header h5">
                        ABOUT ME
                    </div>
                    <div class="card-body">
                        <!-- <p id="owm">.</p> -->
                    </div>
                    <div class="card-footer text-center">
                        <a href="mailto:anthony.pandiani@gmail.com">
                            <button class="btn">anthony.pandiani@gmail.com</button>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <py-config>
        {
            "packages": ["matplotlib", "pytz"]
        }
    </py-config>

    <script type="py" src="./clock.py" async></script>
    <script type="py" src="./owm.py" async></script>
    <script type="py" src="./st2.py" async></script>
    <script type="py" src="./lkr.py"></script>
</body>

</html>
